<!DOCTYPE html>
<html>
<head>
  <title>Water Runner</title>
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: #040b14;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito Sans', Arial, sans-serif;
    color: #d8eeff;
    padding: 12px;
  }

  .game-shell {
    width: min(460px, 100%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #0a1524;
    border: 1px solid #365a7b;
    border-radius: 10px;
    padding: 10px;
  }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #brand img {
    width: 90px;
    height: auto;
  }

  #brandText {
    font-weight: 700;
    font-size: 14px;
    color: #ffd35f;
  }

  #startBtn {
    border: 1px solid #547ea6;
    background: #173b60;
    color: #d8eeff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #startBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  #score {
    font-weight: 700;
  }

  #tinInfo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }

  #tinRow {
    display: flex;
    gap: 4px;
  }

  .tin {
    width: 13px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid #8ea4b8;
    background: #d7dfe7;
  }

  .tin.filled {
    background: linear-gradient(to top, #2f9bff 0 70%, #d7dfe7 70%);
  }

  #damPanel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #buildDam {
    border: 1px solid #4b7ea8;
    background: #12365a;
    color: #d8eeff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #buildDam:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #controlHint {
    font-size: 12px;
    color: #a8c4dd;
  }

  canvas {
    border: 1px solid #7ab6e8;
    display: block;
    width: 100%;
    max-width: 440px;
    align-self: center;
    background: #07101c;
  }

  #status {
    margin: 0;
    min-height: 20px;
    font-size: 14px;
    text-align: center;
  }

  #milestone {
    margin: 0;
    min-height: 20px;
    font-size: 13px;
    text-align: center;
    color: #ffd25e;
  }

  @media (max-width: 500px) {
    #brand img {
      width: 74px;
    }

    #brandText {
      font-size: 12px;
    }

    #topBar {
      flex-wrap: wrap;
    }
  }
  </style>
</head>
<body>
<div class="game-shell">
  <div id="topBar">
    <div id="brand">
      <img src="img/cw_logo_horizontal.png" alt="charity: water logo">
      <span id="brandText">Water Runner</span>
    </div>
    <button id="startBtn" type="button">Start</button>
  </div>
  <div id="hud">
    <span id="score">Score: 0</span>
    <div id="tinInfo">
      <span>Tins</span>
      <div id="tinRow">
        <span class="tin" id="tin1"></span>
        <span class="tin" id="tin2"></span>
        <span class="tin" id="tin3"></span>
      </div>
    </div>
  </div>
  <div id="damPanel">
    <button id="buildDam" type="button" disabled>Build Dam (locked)</button>
    <span id="controlHint">Move: ← → | Build Dam: D</span>
  </div>
  <canvas width="440" height="440" id="game"></canvas>
  <p id="status"></p>
  <p id="milestone"></p>
</div>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');
var scoreEl = document.getElementById('score');
var statusEl = document.getElementById('status');
var milestoneEl = document.getElementById('milestone');
var startBtn = document.getElementById('startBtn');
var buildDamBtn = document.getElementById('buildDam');
var tinEls = [
  document.getElementById('tin1'),
  document.getElementById('tin2'),
  document.getElementById('tin3')
];

var gameState = 'start';
var tinsRequired = 3;
var damPromptScore = 25;
var clearPromptScore = 30;
var score = 0;
var tinsFilled = 0;
var keys = { left: false, right: false };
var frame = 0;
var river = {
  x: canvas.width / 2,
  y: canvas.height - 22,
  segments: [],
  maxSegments: 10,
  speed: 3
};
var drops = [];
var damBuilt = false;
var damPromptShown = false;
var rainIntensity = 0.62;

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function setStatus(message) {
  statusEl.textContent = message;
}

function setSuggestion(message) {
  milestoneEl.textContent = message;
}

function getHeadX() {
  if (river.segments.length === 0) {
    return river.x;
  }
  return river.segments[0].x;
}

function resetRiver() {
  river.x = canvas.width / 2;
  river.segments = [];
  river.maxSegments = 10;
  for (var i = 0; i < river.maxSegments; i++) {
    river.segments.push({ x: river.x, y: river.y });
  }
}

function resetGame() {
  score = 0;
  tinsFilled = 0;
  drops = [];
  frame = 0;
  damBuilt = false;
  damPromptShown = false;
  buildDamBtn.disabled = true;
  buildDamBtn.textContent = 'Build Dam (locked)';
  setSuggestion('');
  resetRiver();
  updateHud();
}

function startGame() {
  resetGame();
  gameState = 'playing';
  startBtn.disabled = true;
  setStatus('Guide the river left and right to collect energetic rain drops.');
}

function updateHud() {
  scoreEl.textContent = 'Score: ' + score;
  tinsFilled = Math.min(3, Math.floor(score / 8));

  for (var i = 0; i < tinEls.length; i++) {
    tinEls[i].classList.toggle('filled', tinsFilled >= i + 1);
  }

  if (damBuilt) {
    buildDamBtn.textContent = 'Dam Built ✓';
    buildDamBtn.disabled = true;
    return;
  }

  if (score >= damPromptScore && score < clearPromptScore) {
    if (tinsFilled >= tinsRequired && gameState === 'playing') {
      buildDamBtn.textContent = 'Build Dam (D)';
      buildDamBtn.disabled = false;
    } else {
      buildDamBtn.textContent = 'Need full tins';
      buildDamBtn.disabled = true;
    }
  } else if (score >= clearPromptScore) {
    buildDamBtn.textContent = 'Suggestion Cleared';
    buildDamBtn.disabled = true;
  } else {
    buildDamBtn.textContent = 'Build Dam (locked)';
    buildDamBtn.disabled = true;
  }
}

function buildDam() {
  if (gameState !== 'playing' || damBuilt || score < damPromptScore || tinsFilled < tinsRequired) {
    return;
  }

  damBuilt = true;
  updateHud();
  setStatus('Dam built! Water tins now force flow toward the top-left village.');
  setSuggestion('Village is now green and flourishing.');
}

function maybeShowDamSuggestion() {
  if (gameState !== 'playing' || damBuilt) {
    return;
  }

  if (score >= damPromptScore && score < clearPromptScore && !damPromptShown) {
    damPromptShown = true;
    setStatus('Build a dam now: use your filled tins to push river flow to the village.');
    setSuggestion('Suggestion: Build dam with water tins before score 30.');
  }

  if (score >= clearPromptScore && !damBuilt) {
    setSuggestion('');
  }
}

function drawVillage() {
  var villageX = 10;
  var villageY = 10;
  var villageW = 130;
  var villageH = 90;

  context.fillStyle = damBuilt ? '#9adf83' : '#d6b98f';
  context.fillRect(villageX, villageY + 26, villageW, villageH - 26);

  context.fillStyle = damBuilt ? '#ffdf8d' : '#c8ae81';
  context.beginPath();
  context.arc(villageX + villageW - 20, villageY + 16, 10, 0, Math.PI * 2);
  context.fill();

  context.fillStyle = damBuilt ? '#5b9f4f' : '#8e7e64';
  context.fillRect(villageX + 12, villageY + 38, 18, 30);
  context.fillRect(villageX + 96, villageY + 40, 18, 28);

  context.fillStyle = '#9d744a';
  context.fillRect(villageX + 42, villageY + 44, 22, 22);
  context.fillRect(villageX + 72, villageY + 44, 22, 22);

  context.fillStyle = damBuilt ? '#2f9bff' : '#8fa7b9';
  context.fillRect(villageX + 28, villageY + 72, 74, 9);

  if (damBuilt) {
    context.beginPath();
    context.moveTo(110, 82);
    context.quadraticCurveTo(150, 160, getHeadX(), river.y - 6);
    context.lineWidth = 6;
    context.strokeStyle = '#51b9ff';
    context.stroke();
    context.lineWidth = 1;
  }
}

function spawnDrop() {
  drops.push({
    x: getRandomInt(6, canvas.width - 6),
    y: -12,
    size: getRandomInt(6, 11),
    vx: (Math.random() * 1.8) - 0.9,
    vy: 2.4 + Math.random() * 2.6,
    phase: Math.random() * Math.PI * 2
  });
}

function updateRiver() {
  if (keys.left && !keys.right) {
    river.x -= river.speed;
  } else if (keys.right && !keys.left) {
    river.x += river.speed;
  }
  river.x = clamp(river.x, 8, canvas.width - 8);

  river.segments.unshift({ x: river.x, y: river.y });
  if (river.segments.length > river.maxSegments) {
    river.segments.pop();
  }
}

function collectDrop(index) {
  drops.splice(index, 1);
  score += 1;
  river.maxSegments = Math.min(140, river.maxSegments + 1);
  updateHud();
  maybeShowDamSuggestion();
}

function updateDrops() {
  for (var i = drops.length - 1; i >= 0; i--) {
    var drop = drops[i];
    drop.phase += 0.22;
    drop.x += drop.vx + Math.sin(drop.phase) * 0.7;
    drop.y += drop.vy;

    if (drop.y > canvas.height + 20 || drop.x < -20 || drop.x > canvas.width + 20) {
      drops.splice(i, 1);
      continue;
    }

    for (var j = 0; j < river.segments.length; j++) {
      var seg = river.segments[j];
      if (Math.abs(drop.x - seg.x) < 9 && Math.abs(drop.y - seg.y) < 9) {
        collectDrop(i);
        break;
      }
    }
  }
}

function drawDrops() {
  for (var i = 0; i < drops.length; i++) {
    var drop = drops[i];
    context.fillStyle = '#35c7ff';
    context.beginPath();
    context.ellipse(drop.x, drop.y, drop.size * 0.4, drop.size * 0.65, 0, 0, Math.PI * 2);
    context.fill();
  }
}

function drawBoard() {
  context.fillStyle = '#061321';
  context.fillRect(0, 0, canvas.width, canvas.height);

  context.fillStyle = 'rgba(255,255,255,0.04)';
  for (var storm = 0; storm < 18; storm++) {
    var px = (storm * 27 + frame * 2) % (canvas.width + 24);
    context.fillRect(px, 0, 2, 18);
  }

  drawVillage();
  drawDrops();

  for (var i = 0; i < river.segments.length; i++) {
    var seg = river.segments[i];
    context.fillStyle = i === 0 ? '#9be0ff' : '#2f9bff';
    context.fillRect(seg.x - 5, seg.y - 5, 10, 10);
  }

  if (!damBuilt && score >= damPromptScore && score < clearPromptScore) {
    context.fillStyle = '#9e7a52';
    for (var block = 0; block < 4; block++) {
      context.fillRect(122 + block * 13, 82, 10, 8);
    }
  }
}

function drawOverlay(text) {
  context.fillStyle = 'rgba(0, 0, 0, 0.55)';
  context.fillRect(0, 0, canvas.width, canvas.height);
  context.fillStyle = '#ffffff';
  context.font = 'bold 22px Arial';
  context.textAlign = 'center';
  context.fillText(text, canvas.width / 2, canvas.height / 2 - 8);
  context.font = '14px Arial';
  context.fillText('Click Start to Begin', canvas.width / 2, canvas.height / 2 + 20);
}

function loop() {
  requestAnimationFrame(loop);
  frame++;

  if (gameState !== 'playing') {
    drawBoard();
    drawOverlay('Water Runner');
    return;
  }

  if (frame % 2 === 0) {
    updateRiver();
  }

  if (Math.random() < rainIntensity) {
    spawnDrop();
  }

  updateDrops();
  maybeShowDamSuggestion();
  drawBoard();
}

document.addEventListener('keydown', function(e) {
  if (gameState !== 'playing') {
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    keys.left = true;
  }

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    keys.right = true;
  }

  if (e.key === 'd' || e.key === 'D') {
    e.preventDefault();
    buildDam();
  }
});

document.addEventListener('keyup', function(e) {
  if (e.key === 'ArrowLeft') {
    keys.left = false;
  }
  if (e.key === 'ArrowRight') {
    keys.right = false;
  }
});

startBtn.addEventListener('click', function() {
  startGame();
});

buildDamBtn.addEventListener('click', function() {
  buildDam();
});

resetGame();
updateHud();
setStatus('Click Start to launch the river.');
requestAnimationFrame(loop);
</script>
</body>
</html>
