<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Runner - CSS Prototype</title>
  <link rel="stylesheet" href="prompt6-water-runner.css" />
</head>
<body>
  <main class="runner" aria-label="Water Runner CSS prototype">
    <input class="drop-toggle" type="checkbox" id="drop-1" />
    <label class="drop d1" for="drop-1" aria-label="Collect raindrop 1"></label>
    <input class="drop-toggle" type="checkbox" id="drop-2" />
    <label class="drop d2" for="drop-2" aria-label="Collect raindrop 2"></label>
    <input class="drop-toggle" type="checkbox" id="drop-3" />
    <label class="drop d3" for="drop-3" aria-label="Collect raindrop 3"></label>
    <input class="drop-toggle" type="checkbox" id="drop-4" />
    <label class="drop d4" for="drop-4" aria-label="Collect raindrop 4"></label>
    <input class="drop-toggle" type="checkbox" id="drop-5" />
    <label class="drop d5" for="drop-5" aria-label="Collect raindrop 5"></label>
    <input class="drop-toggle" type="checkbox" id="drop-6" />
    <label class="drop d6" for="drop-6" aria-label="Collect raindrop 6"></label>
    <input class="drop-toggle" type="checkbox" id="drop-7" />
    <label class="drop d7" for="drop-7" aria-label="Collect raindrop 7"></label>
    <input class="drop-toggle" type="checkbox" id="drop-8" />
    <label class="drop d8" for="drop-8" aria-label="Collect raindrop 8"></label>
    <input class="drop-toggle" type="checkbox" id="drop-9" />
    <label class="drop d9" for="drop-9" aria-label="Collect raindrop 9"></label>
    <input class="drop-toggle" type="checkbox" id="drop-10" />
    <label class="drop d10" for="drop-10" aria-label="Collect raindrop 10"></label>
    <input class="drop-toggle" type="checkbox" id="drop-11" />
    <label class="drop d11" for="drop-11" aria-label="Collect raindrop 11"></label>
    <input class="drop-toggle" type="checkbox" id="drop-12" />
    <label class="drop d12" for="drop-12" aria-label="Collect raindrop 12"></label>
    <input class="drop-toggle" type="checkbox" id="drop-13" />
    <label class="drop d13" for="drop-13" aria-label="Collect raindrop 13"></label>
    <input class="drop-toggle" type="checkbox" id="drop-14" />
    <label class="drop d14" for="drop-14" aria-label="Collect raindrop 14"></label>
    <input class="drop-toggle" type="checkbox" id="drop-15" />
    <label class="drop d15" for="drop-15" aria-label="Collect raindrop 15"></label>
    <input class="drop-toggle" type="checkbox" id="drop-16" />
    <label class="drop d16" for="drop-16" aria-label="Collect raindrop 16"></label>
    <input class="drop-toggle" type="checkbox" id="drop-17" />
    <label class="drop d17" for="drop-17" aria-label="Collect raindrop 17"></label>
    <input class="drop-toggle" type="checkbox" id="drop-18" />
    <label class="drop d18" for="drop-18" aria-label="Collect raindrop 18"></label>
    <input class="drop-toggle" type="checkbox" id="drop-19" />
    <label class="drop d19" for="drop-19" aria-label="Collect raindrop 19"></label>
    <input class="drop-toggle" type="checkbox" id="drop-20" />
    <label class="drop d20" for="drop-20" aria-label="Collect raindrop 20"></label>
    <input class="drop-toggle" type="checkbox" id="drop-21" />
    <label class="drop d21" for="drop-21" aria-label="Collect raindrop 21"></label>
    <input class="drop-toggle" type="checkbox" id="drop-22" />
    <label class="drop d22" for="drop-22" aria-label="Collect raindrop 22"></label>
    <input class="drop-toggle" type="checkbox" id="drop-23" />
    <label class="drop d23" for="drop-23" aria-label="Collect raindrop 23"></label>
    <input class="drop-toggle" type="checkbox" id="drop-24" />
    <label class="drop d24" for="drop-24" aria-label="Collect raindrop 24"></label>

    <header class="topbar">
      <img src="img/cw_logo_horizontal.png" alt="charity: water logo" class="cw-logo" />
      <div class="title-wrap">
        <h1>Water Runner</h1>
        <p>Collect. Build. Deliver.</p>
      </div>
      <div class="score-card">
        <span>Water Score</span>
        <strong class="score-value" aria-live="polite"></strong>
      </div>
    </header>

    <section class="playfield" aria-label="Rain collection village scene">
      <div class="sun" aria-hidden="true"></div>

      <div class="river-track" aria-hidden="true">
        <div class="river-progress"></div>
      </div>

      <div class="dam-zone" aria-hidden="true">
        <div class="dam-block"></div>
        <div class="dam-block"></div>
        <div class="dam-block"></div>
        <div class="dam-block"></div>
        <div class="dam-block"></div>
      </div>

      <div class="tin-bank" aria-hidden="true">
        <div class="tin"><span class="tin-fill"></span></div>
        <div class="tin"><span class="tin-fill"></span></div>
        <div class="tin"><span class="tin-fill"></span></div>
      </div>

      <div class="village village-dry" aria-hidden="true">
        <div class="ground"></div>
        <div class="hut hut-a"></div>
        <div class="hut hut-b"></div>
        <div class="tree tree-a"></div>
        <div class="tree tree-b"></div>
      </div>

      <div class="village village-thriving" aria-hidden="true">
        <div class="ground"></div>
        <div class="hut hut-a"></div>
        <div class="hut hut-b"></div>
        <div class="tree tree-a"></div>
        <div class="tree tree-b"></div>
      </div>
    </section>

    <p class="instructions">Tap falling drops to gather water. The river grows as you collect. Fill tins and dam flow to restore the village.</p>
    <p class="congrats">Congratulations! Water score over 20 — your village is now thriving.</p>
  </main>
</body>
</html>
