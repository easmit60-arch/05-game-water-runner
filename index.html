<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Water Runner</title>
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: #040b14;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito Sans', Arial, sans-serif;
    color: #d8eeff;
    padding: 12px;
  }

  .game-shell {
    width: min(460px, 100%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #0a1524;
    border: 1px solid #365a7b;
    border-radius: 10px;
    padding: 10px;
  }

  #topBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #brand {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #brand img {
    width: 90px;
    height: auto;
  }

  #brandText {
    font-weight: 700;
    font-size: 14px;
    color: #ffd35f;
  }

  #startBtn {
    border: 1px solid #547ea6;
    background: #173b60;
    color: #d8eeff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #startBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .top-nav {
    display: flex;
    justify-content: center;
    gap: 10px;
    font-size: 12px;
    padding: 6px 8px;
    border: 1px solid #365a7b;
    border-radius: 6px;
    background: #0c1c30;
  }

  .top-nav a {
    color: #8cc8ff;
    text-decoration: none;
    font-weight: 600;
  }

  .top-nav a:hover {
    text-decoration: underline;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  #score {
    font-weight: 700;
  }

  #tinInfo {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }

  #tinRow {
    display: flex;
    gap: 4px;
  }

  .tin {
    width: 13px;
    height: 16px;
    border-radius: 3px;
    border: 1px solid #8ea4b8;
    background: #d7dfe7;
  }

  .tin.filled {
    background: linear-gradient(to top, #2f9bff 0 70%, #d7dfe7 70%);
  }

  #damPanel {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  #buildDam {
    border: 1px solid #4b7ea8;
    background: #12365a;
    color: #d8eeff;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    cursor: pointer;
  }

  #buildDam:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #controlHint {
    font-size: 12px;
    color: #a8c4dd;
  }

  canvas {
    border: 1px solid #7ab6e8;
    display: block;
    width: 100%;
    max-width: 440px;
    align-self: center;
    background: #07101c;
  }

  #status {
    margin: 0;
    min-height: 20px;
    font-size: 14px;
    text-align: center;
  }

  #milestone {
    margin: 0;
    min-height: 20px;
    font-size: 13px;
    text-align: center;
    color: #ffd25e;
  }

  @media (max-width: 500px) {
    #brand img {
      width: 74px;
    }

    #brandText {
      font-size: 12px;
    }

    #topBar {
      flex-wrap: wrap;
    }
  }
  </style>
</head>
<body>
<div class="game-shell">
  <nav class="top-nav" aria-label="Main navigation">
    <a href="index.html">Game</a>
    <a href="README.md">Prompt Guide (README)</a>
  </nav>
  <div id="topBar">
    <div id="brand">
      <img src="img/cw_logo_horizontal.png" alt="charity: water logo">
      <span id="brandText">Water Runner</span>
    </div>
    <button id="startBtn" type="button">Start</button>
  </div>
  <div id="hud">
    <span id="score">Score: 0</span>
    <div id="tinInfo">
      <span>Tins</span>
      <div id="tinRow">
        <span class="tin" id="tin1"></span>
        <span class="tin" id="tin2"></span>
        <span class="tin" id="tin3"></span>
      </div>
    </div>
  </div>
  <div id="damPanel">
    <button id="buildDam" type="button" disabled>Build Dam (locked)</button>
    <span id="controlHint">Move: ← → | Build Dam: D</span>
  </div>
  <canvas width="440" height="440" id="game"></canvas>
  <p id="status"></p>
  <p id="milestone"></p>
</div>
<script>
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const statusEl = document.getElementById('status');
const milestoneEl = document.getElementById('milestone');
const startBtn = document.getElementById('startBtn');
const buildDamBtn = document.getElementById('buildDam');
const tinEls = [
  document.getElementById('tin1'),
  document.getElementById('tin2'),
  document.getElementById('tin3')
];

const game = {
  state: 'start',
  frame: 0,
  score: 0,
  rainIntensity: 0.72,
  tinsRequired: 3,
  damPromptScore: 25,
  clearPromptScore: 30,
  tinsFilled: 0,
  damBuilt: false,
  damPromptShown: false,
  keys: { left: false, right: false },
  river: {
    x: canvas.width / 2,
    y: canvas.height - 26,
    speed: 2.2,
    direction: 1,
    segments: [],
    maxSegments: 12
  },
  drops: []
};

function randomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

const KEY_LEFT = 'ArrowLeft';
const KEY_RIGHT = 'ArrowRight';

function setStatus(message) {
  statusEl.textContent = message;
}

function setSuggestion(message) {
  milestoneEl.textContent = message;
}

function resetRiver() {
  game.river.x = canvas.width / 2;
  game.river.direction = 1;
  game.river.segments = [];
  game.river.maxSegments = 12;
  for (let i = 0; i < game.river.maxSegments; i++) {
    game.river.segments.push({ x: game.river.x, y: game.river.y });
  }
}

function resetGame() {
  game.score = 0;
  game.tinsFilled = 0;
  game.frame = 0;
  game.drops = [];
  game.damBuilt = false;
  game.damPromptShown = false;
  game.keys.left = false;
  game.keys.right = false;
  buildDamBtn.disabled = true;
  buildDamBtn.textContent = 'Build Dam (locked)';
  setSuggestion('');
  resetRiver();
  updateHud();
}

function startGame() {
  resetGame();
  game.state = 'playing';
  startBtn.disabled = true;
  setStatus('Use left/right to steer the river and catch the rain.');
}

function updateHud() {
  scoreEl.textContent = 'Score: ' + game.score;
  game.tinsFilled = Math.min(3, Math.floor(game.score / 8));

  for (let i = 0; i < tinEls.length; i++) {
    tinEls[i].classList.toggle('filled', game.tinsFilled >= i + 1);
  }

  if (game.damBuilt) {
    buildDamBtn.textContent = 'Dam Built ✓';
    buildDamBtn.disabled = true;
    return;
  }

  if (game.score >= game.damPromptScore && game.score < game.clearPromptScore) {
    if (game.tinsFilled >= game.tinsRequired && game.state === 'playing') {
      buildDamBtn.textContent = 'Build Dam (D)';
      buildDamBtn.disabled = false;
    } else {
      buildDamBtn.textContent = 'Need full tins';
      buildDamBtn.disabled = true;
    }
  } else if (game.score >= game.clearPromptScore) {
    buildDamBtn.textContent = 'Suggestion Cleared';
    buildDamBtn.disabled = true;
  } else {
    buildDamBtn.textContent = 'Build Dam (locked)';
    buildDamBtn.disabled = true;
  }
}

function maybeShowDamSuggestion() {
  if (game.state !== 'playing' || game.damBuilt) {
    return;
  }

  if (game.score >= game.damPromptScore && game.score < game.clearPromptScore && !game.damPromptShown) {
    game.damPromptShown = true;
    setStatus('Build a dam now: use filled tins to route water to the village.');
    setSuggestion('Suggestion: Build dam with tins before score 30.');
  }

  if (game.score >= game.clearPromptScore && !game.damBuilt) {
    setSuggestion('');
  }
}

function buildDam() {
  if (game.state !== 'playing' || game.damBuilt) {
    return;
  }
  if (game.score < game.damPromptScore || game.tinsFilled < game.tinsRequired) {
    return;
  }

  game.damBuilt = true;
  updateHud();
  setStatus('Dam built! River now flows to the top-left village.');
  setSuggestion('Great work: the village is green and flourishing.');
}

function spawnDrop() {
  game.drops.push({
    x: randomInt(8, canvas.width - 8),
    y: -12,
    size: randomInt(6, 12),
    vx: (Math.random() * 3.4) - 1.7,
    vy: 2.8 + Math.random() * 3.3,
    phase: Math.random() * Math.PI * 2
  });
}

function updateRiver() {
  if (game.keys.left && !game.keys.right) {
    game.river.direction = -1;
  } else if (game.keys.right && !game.keys.left) {
    game.river.direction = 1;
  }

  game.river.x += game.river.direction * game.river.speed;

  if (game.river.x < 10) {
    game.river.x = 10;
    game.river.direction = 1;
  } else if (game.river.x > canvas.width - 10) {
    game.river.x = canvas.width - 10;
    game.river.direction = -1;
  }

  game.river.segments.unshift({ x: game.river.x, y: game.river.y });
  if (game.river.segments.length > game.river.maxSegments) {
    game.river.segments.pop();
  }
}

function collectDrop(index) {
  game.drops.splice(index, 1);
  game.score += 1;
  game.river.maxSegments = Math.min(190, game.river.maxSegments + 1);
  updateHud();
  maybeShowDamSuggestion();
}

function updateDrops() {
  for (let i = game.drops.length - 1; i >= 0; i--) {
    const drop = game.drops[i];
    drop.phase += 0.22;
    drop.x += drop.vx + Math.sin(drop.phase) * 0.85;
    drop.y += drop.vy;

    if (drop.y > canvas.height + 18 || drop.x < -24 || drop.x > canvas.width + 24) {
      game.drops.splice(i, 1);
      continue;
    }

    const nearHead = Math.abs(drop.x - game.river.x) < 22 && Math.abs(drop.y - game.river.y) < 16;
    if (nearHead) {
      collectDrop(i);
      continue;
    }

    const segmentLimit = Math.min(game.river.segments.length, 18);
    for (let j = 0; j < segmentLimit; j++) {
      const segment = game.river.segments[j];
      if (Math.abs(drop.x - segment.x) < 10 && Math.abs(drop.y - segment.y) < 10) {
        collectDrop(i);
        break;
      }
    }
  }
}

function drawVillage() {
  const villageX = 10;
  const villageY = 10;
  const villageW = 132;
  const villageH = 92;

  context.fillStyle = game.damBuilt ? '#9adf83' : '#d6b98f';
  context.fillRect(villageX, villageY + 26, villageW, villageH - 26);

  context.fillStyle = game.damBuilt ? '#ffdf8d' : '#c8ae81';
  context.beginPath();
  context.arc(villageX + villageW - 20, villageY + 16, 10, 0, Math.PI * 2);
  context.fill();

  context.fillStyle = game.damBuilt ? '#5b9f4f' : '#8e7e64';
  context.fillRect(villageX + 12, villageY + 38, 18, 30);
  context.fillRect(villageX + 96, villageY + 40, 18, 28);

  context.fillStyle = '#9d744a';
  context.fillRect(villageX + 42, villageY + 44, 22, 22);
  context.fillRect(villageX + 72, villageY + 44, 22, 22);

  context.fillStyle = game.damBuilt ? '#2f9bff' : '#8fa7b9';
  context.fillRect(villageX + 28, villageY + 72, 74, 9);

  if (game.damBuilt) {
    context.beginPath();
    context.moveTo(112, 82);
    context.quadraticCurveTo(160, 168, game.river.x, game.river.y - 6);
    context.lineWidth = 6;
    context.strokeStyle = '#51b9ff';
    context.stroke();
    context.lineWidth = 1;
  }
}

function drawDrops() {
  for (let i = 0; i < game.drops.length; i++) {
    const drop = game.drops[i];
    context.fillStyle = '#35c7ff';
    context.beginPath();
    context.ellipse(drop.x, drop.y, drop.size * 0.42, drop.size * 0.66, 0, 0, Math.PI * 2);
    context.fill();
  }
}

function drawRiver() {
  if (game.river.segments.length > 1) {
    context.beginPath();
    context.moveTo(game.river.segments[0].x, game.river.segments[0].y);
    for (let i = 1; i < game.river.segments.length; i++) {
      context.lineTo(game.river.segments[i].x, game.river.segments[i].y);
    }
    context.strokeStyle = '#2f9bff';
    context.lineWidth = 8;
    context.lineCap = 'round';
    context.stroke();
    context.lineWidth = 1;
  }

  for (let i = 0; i < game.river.segments.length; i += 4) {
    const seg = game.river.segments[i];
    context.fillStyle = i === 0 ? '#9be0ff' : '#2f9bff';
    context.beginPath();
    context.arc(seg.x, seg.y, i === 0 ? 6 : 4, 0, Math.PI * 2);
    context.fill();
  }
}

function drawBoard() {
  context.fillStyle = '#061321';
  context.fillRect(0, 0, canvas.width, canvas.height);

  context.fillStyle = 'rgba(255,255,255,0.04)';
  for (let storm = 0; storm < 20; storm++) {
    const px = (storm * 24 + game.frame * 2) % (canvas.width + 24);
    context.fillRect(px, 0, 2, 18);
  }

  drawVillage();
  drawDrops();
  drawRiver();

  if (!game.damBuilt && game.score >= game.damPromptScore && game.score < game.clearPromptScore) {
    context.fillStyle = '#9e7a52';
    for (let block = 0; block < 4; block++) {
      context.fillRect(122 + block * 13, 82, 10, 8);
    }
  }
}

function drawOverlay(text) {
  context.fillStyle = 'rgba(0, 0, 0, 0.55)';
  context.fillRect(0, 0, canvas.width, canvas.height);
  context.fillStyle = '#ffffff';
  context.font = 'bold 22px Arial';
  context.textAlign = 'center';
  context.fillText(text, canvas.width / 2, canvas.height / 2 - 8);
  context.font = '14px Arial';
  context.fillText('Click Start to Begin', canvas.width / 2, canvas.height / 2 + 20);
}

function loop() {
  requestAnimationFrame(loop);
  game.frame++;

  if (game.state !== 'playing') {
    drawBoard();
    drawOverlay('Water Runner');
    return;
  }

  updateRiver();

  if (Math.random() < game.rainIntensity) {
    spawnDrop();
  }

  updateDrops();
  maybeShowDamSuggestion();
  drawBoard();
}

document.addEventListener('keydown', function(e) {
  if (game.state !== 'playing') {
    return;
  }

  if (e.key === KEY_LEFT) {
    e.preventDefault();
    game.keys.left = true;
  }

  if (e.key === KEY_RIGHT) {
    e.preventDefault();
    game.keys.right = true;
  }

  if (e.key === 'd' || e.key === 'D') {
    e.preventDefault();
    buildDam();
  }
});

document.addEventListener('keyup', function(e) {
  if (e.key === KEY_LEFT) {
    game.keys.left = false;
  }
  if (e.key === KEY_RIGHT) {
    game.keys.right = false;
  }
});

startBtn.addEventListener('click', function() {
  startGame();
});

buildDamBtn.addEventListener('click', function() {
  buildDam();
});

resetGame();
updateHud();
setStatus('Click Start to launch the river.');
requestAnimationFrame(loop);
</script>
</body>
</html>
